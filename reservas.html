<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Sabores do Brasil</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">🍽️ Sabores do Brasil</div>
            <ul class="nav-links">
                <li><a href="index.html">Cardápio</a></li>
                <li><a href="reservas.html" class="active">Reservas</a></li>
                <li><a href="index.html#carrinho" id="cart-link">🛒 Carrinho (<span id="cart-count">0</span>)</a></li>
            </ul>
            <div class="hamburger">☰</div>
        </nav>
        <div class="hero" style="height: 50vh;">
            <h1>📅 Sistema de Reservas</h1>
            <p>Reserve sua mesa agora e garanta seu lugar!</p>
        </div>
    </header>

    <main class="reservas-page">
        <section class="reservations-section">
            <h2>Faça sua Reserva</h2>
            <form id="reservation-form" x-data="{ submitting: false }">
                <input type="text" id="res-name" placeholder="Nome completo" required>
                <input type="email" id="res-email" placeholder="Email" required>
                <input type="tel" id="res-phone" placeholder="Telefone (opcional)">
                <input type="date" id="res-date" :min="new Date().toISOString().split('T')[0]" required>
                <input type="time" id="res-time" required>
                <input type="number" id="res-guests" placeholder="Nº de pessoas" min="1" max="10" required>
                <button type="submit" x-bind:disabled="submitting">
                    <span x-show="!submitting">Reservar Mesa</span>
                    <span x-show="submitting">Reservando...</span>
                </button>
            </form>

            <h3>Próximas Reservas</h3>
            <div id="reservations-list" class="reservations-grid"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Sabores do Brasil. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Auto-init reservas on load
        window.addEventListener('load', () => {
            initDB().then(() => {
                loadReservations();
            });
        });
    </script>
</body>

</html>
